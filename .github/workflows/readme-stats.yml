name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=github_dark&hide_border=true&bg_color=00000000&title_color=58A6FF&icon_color=58A6FF&text_color=C9D1D9
          path: profile/stats-dark.svg
          token: ${{ secrets.README_STATS_TOKEN || github.token }}

      - name: Generate stats card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=default&hide_border=true&bg_color=00000000&title_color=0969DA&icon_color=0969DA&text_color=1F2328
          path: profile/stats-light.svg
          token: ${{ secrets.README_STATS_TOKEN || github.token }}

      - name: Generate top languages card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=github_dark&hide_border=true&bg_color=00000000&title_color=58A6FF&text_color=C9D1D9&langs_count=10
          path: profile/top-langs-dark.svg
          token: ${{ secrets.README_STATS_TOKEN || github.token }}

      - name: Generate top languages card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=default&hide_border=true&bg_color=00000000&title_color=0969DA&text_color=1F2328&langs_count=10
          path: profile/top-langs-light.svg
          token: ${{ secrets.README_STATS_TOKEN || github.token }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update README cards"
          git push
